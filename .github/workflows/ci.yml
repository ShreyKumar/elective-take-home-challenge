name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test

  e2e:
    name: E2E tests (Cypress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Bun skips lifecycle scripts for untrusted deps; download the Cypress
      # binary explicitly (also covered by trustedDependencies in package.json).
      - run: bunx cypress install
      - name: Run Cypress against the dev server
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: bun run dev
          wait-on: http://localhost:5173
          wait-on-timeout: 120
